name: popularvideo
description: PopularVideo/CinLink tools exposed through the standalone CLI.
tools:
  - name: popularvideo_doctor
    command: popularvideo --json doctor
    args_schema: {}
  - name: popularvideo_agent_run
    command: popularvideo --json agent run "{prompt}"
    args_schema:
      prompt: string
      context_file: string[]
      mode: string
      wait: boolean
  - name: popularvideo_transcribe
    command: popularvideo --json transcribe "{input_path}"
    args_schema:
      input_path: string
      lang: string
      out: string
  - name: popularvideo_translate
    command: popularvideo --json translate "{input_path}" --to "{to_lang}"
    args_schema:
      input_path: string
      from_lang: string
      to_lang: string
      bilingual: boolean
      delivery: string
      out: string
  - name: popularvideo_burn
    command: popularvideo --json burn "{video_path}" --subtitle "{subtitle_path}"
    args_schema:
      video_path: string
      subtitle_path: string
      out: string
  - name: popularvideo_mcp
    command: popularvideo-mcp
    transport: stdio
